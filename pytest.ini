[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
    -p no:cacheprovider
markers =
    p0: 核心 P0 用例（必须全部通过）
    p1: 重要 P1 用例
    p2: 常规 P2 用例
    p3: 低风险 P3 用例
    tel: 遥测采集与基础链路 (SOC-TEL-*)
    att: MITRE 攻击场景 (SOC-ATT-*)
    ai_api: AI 平台/API 安全 (SOC-AI-001~014)
    ai_socket: Agent/Socket 运行时安全 (SOC-AI-015~030)
    wf: SOC 工作流与 AI 研判 (SOC-WF-*)
    pipeline: 端到端流水线冒烟
    baseline: 平台基线/HTTP 边界/契约（SOC-WEB-* / SOC-AUTH-* / SOC-API-*）
    needs_ssh: 需要被测主机 SSH 凭据
    needs_wazuh: 需要 Wazuh API/Indexer 凭据
    destructive: L3/L4 破坏性用例（默认跳过）
log_cli = false
log_cli_level = INFO
filterwarnings =
    ignore::DeprecationWarning
    ignore::urllib3.exceptions.InsecureRequestWarning
